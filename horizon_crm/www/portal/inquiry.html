{% extends "templates/web.html" %}

{% block title %}Plan a Trip{% endblock %}

{% block page_content %}
<div class="portal-container">
    <div class="portal-header">
        <h2>Plan Your Next Adventure</h2>
        <p>Tell us about your dream trip and we'll craft the perfect itinerary</p>
    </div>

    <div class="portal-form">
        <div id="inquiry-form">
            <div class="row">
                <div class="col-md-6">
                    <div id="field-destination"></div>
                </div>
                <div class="col-md-6">
                    <div id="field-travel_type"></div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div id="field-departure_date"></div>
                </div>
                <div class="col-md-4">
                    <div id="field-return_date"></div>
                </div>
                <div class="col-md-4">
                    <div id="field-num_travelers"></div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div id="field-budget_min"></div>
                </div>
                <div class="col-md-6">
                    <div id="field-budget_max"></div>
                </div>
            </div>

            <div id="field-notes"></div>

            <button id="btn-submit" class="btn btn-primary btn-md mt-3">
                Submit Inquiry
            </button>
        </div>
    </div>
</div>

<script>
frappe.ready(function() {
    // Build travel type options from Jinja context
    var type_options = "\n{% for tt in travel_types %}{{ tt.type_name }}\n{% endfor %}";

    var fields = {};

    var field_defs = [
        { parent: '#field-destination', df: {
            fieldtype: 'Data', fieldname: 'destination', label: 'Where do you want to go?',
            reqd: 1, placeholder: 'e.g., Bali, Paris, Maldives...'
        }},
        { parent: '#field-travel_type', df: {
            fieldtype: 'Select', fieldname: 'travel_type', label: 'Type of Travel',
            options: type_options
        }},
        { parent: '#field-departure_date', df: {
            fieldtype: 'Date', fieldname: 'departure_date', label: 'Departure Date', reqd: 1
        }},
        { parent: '#field-return_date', df: {
            fieldtype: 'Date', fieldname: 'return_date', label: 'Return Date', reqd: 1
        }},
        { parent: '#field-num_travelers', df: {
            fieldtype: 'Int', fieldname: 'num_travelers', label: 'Number of Travelers', default: 1
        }},
        { parent: '#field-budget_min', df: {
            fieldtype: 'Currency', fieldname: 'budget_min', label: 'Minimum Budget'
        }},
        { parent: '#field-budget_max', df: {
            fieldtype: 'Currency', fieldname: 'budget_max', label: 'Maximum Budget'
        }},
        { parent: '#field-notes', df: {
            fieldtype: 'Small Text', fieldname: 'notes', label: 'Additional Details',
            placeholder: 'Tell us about any special requirements, preferences, or activities you\'d like...'
        }}
    ];

    field_defs.forEach(function(def) {
        var ctrl = frappe.ui.form.make_control({
            df: def.df,
            parent: $(def.parent),
            render_input: true
        });
        ctrl.refresh();
        if (def.df.default) {
            ctrl.set_value(def.df.default);
        }
        fields[def.df.fieldname] = ctrl;
    });

    // Submit handler
    $('#btn-submit').on('click', function() {
        var btn = $(this);
        var dest = fields.destination.get_value();
        var dep = fields.departure_date.get_value();
        var ret = fields.return_date.get_value();

        if (!dest) {
            frappe.msgprint({ title: 'Missing Field', message: 'Please enter a destination.', indicator: 'orange' });
            return;
        }
        if (!dep) {
            frappe.msgprint({ title: 'Missing Field', message: 'Please select a departure date.', indicator: 'orange' });
            return;
        }
        if (!ret) {
            frappe.msgprint({ title: 'Missing Field', message: 'Please select a return date.', indicator: 'orange' });
            return;
        }

        btn.prop('disabled', true).text('Submitting...');

        frappe.call({
            method: 'horizon_crm.api.portal.submit_inquiry',
            args: {
                destination: dest,
                departure_date: dep,
                return_date: ret,
                num_travelers: parseInt(fields.num_travelers.get_value()) || 1,
                travel_type: fields.travel_type.get_value() || null,
                budget_min: parseFloat(fields.budget_min.get_value()) || 0,
                budget_max: parseFloat(fields.budget_max.get_value()) || 0,
                notes: fields.notes.get_value() || ''
            },
            callback: function(r) {
                if (r.message) {
                    frappe.msgprint({
                        title: 'Inquiry Submitted!',
                        message: 'Your travel inquiry has been submitted successfully. Our team will contact you soon.',
                        indicator: 'green'
                    });
                    setTimeout(function() {
                        window.location.href = '/portal';
                    }, 2000);
                }
            },
            error: function() {
                btn.prop('disabled', false).text('Submit Inquiry');
            }
        });
    });
});
</script>
{% endblock %}
