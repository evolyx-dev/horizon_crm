# ─────────────────────────────────────────────────────────────
# Horizon CRM — Production Docker Compose
#
# Architecture:
#   nginx → frappe-web (gunicorn :8000)
#         → frappe-socketio (node :9000)
#   frappe-worker   (background jobs)
#   frappe-scheduler (periodic tasks)
#   redis-cache     (caching)
#   redis-queue     (job queue + socketio pubsub)
#
# Database is EXTERNAL (Oracle MySQL HeatWave, managed MariaDB,
# or any MySQL 8.x / MariaDB 10.6+). Set DB_HOST in .env.
#
# Usage:
#   cp deploy/.env.template deploy/.env   # edit with real values
#   docker compose -f deploy/docker-compose.prod.yml build
#   docker compose -f deploy/docker-compose.prod.yml up -d
#
# First run — create the site:
#   docker compose -f deploy/docker-compose.prod.yml run --rm frappe-web new-site
# ─────────────────────────────────────────────────────────────

name: horizon-crm-prod

x-frappe-common: &frappe-common
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  image: horizon-crm:latest
  env_file: .env
  restart: unless-stopped
  depends_on:
    redis-cache:
      condition: service_healthy
    redis-queue:
      condition: service_healthy
  volumes:
    - sites-data:/home/frappe/frappe-bench/sites
    - logs-data:/home/frappe/frappe-bench/logs

services:
  # ── Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: horizon-nginx
    restart: unless-stopped
    depends_on:
      frappe-web:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - sites-data:/srv/sites:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--header=Host: ${FRAPPE_SITE_NAME:-horizon.localhost}", "http://localhost/api/method/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frappe Web (Gunicorn) ──────────────────────────────────
  frappe-web:
    <<: *frappe-common
    container_name: horizon-web
    command: ["web"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: ${FRAPPE_SITE_NAME:-horizon.localhost}", "http://localhost:8000/api/method/ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s

  # ── Frappe Socketio (Node.js) ──────────────────────────────
  frappe-socketio:
    <<: *frappe-common
    container_name: horizon-socketio
    command: ["socketio"]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9000/socket.io/?EIO=4&transport=polling', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Background Worker ──────────────────────────────────────
  frappe-worker:
    <<: *frappe-common
    container_name: horizon-worker
    command: ["worker"]
    healthcheck:
      disable: true

  # ── Scheduler (cron-like) ──────────────────────────────────
  frappe-scheduler:
    <<: *frappe-common
    container_name: horizon-scheduler
    command: ["scheduler"]
    healthcheck:
      disable: true

  # ── Redis Cache ────────────────────────────────────────────
  redis-cache:
    image: redis:7-alpine
    container_name: horizon-redis-cache
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-cache-data:/data

  # ── Redis Queue ────────────────────────────────────────────
  redis-queue:
    image: redis:7-alpine
    container_name: horizon-redis-queue
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy noeviction
      --save 60 1000
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-queue-data:/data

  # ── Local MariaDB (for testing only — use profile "with-db") ─
  # docker compose -f deploy/docker-compose.prod.yml --profile with-db up -d
  mariadb:
    image: mariadb:10.6
    container_name: horizon-mariadb
    profiles: ["with-db"]
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-changeme_db_root_password}"
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mariadb-data:/var/lib/mysql

volumes:
  sites-data:
  logs-data:
  redis-cache-data:
  redis-queue-data:
  mariadb-data:
