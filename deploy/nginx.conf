# ─────────────────────────────────────────────────────────────
# Horizon CRM — Nginx Production Config
#
# Routes:
#   /socket.io  → frappe-socketio:9000  (WebSocket + polling)
#   /assets     → static files from sites volume
#   /*          → frappe-web:8000       (Gunicorn)
# ─────────────────────────────────────────────────────────────

upstream frappe-web {
    server frappe-web:8000 fail_timeout=0;
}

upstream frappe-socketio {
    server frappe-socketio:9000 fail_timeout=0;
}

# Rate limiting for portal/API
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=portal:10m rate=5r/s;

server {
    listen 80;
    server_name _;

    # Max upload size (Frappe default is 25MB)
    client_max_body_size 50m;

    # Gzip compression
    gzip on;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        application/xml application/xml+rss
        image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_vary on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static assets (served directly by nginx) ─────────────
    location /assets {
        alias /srv/sites/assets;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Socketio — WebSocket upgrade ─────────────────────────
    location /socket.io {
        proxy_pass http://frappe-socketio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Portal API — rate-limited ────────────────────────────
    location /api/method/horizon_crm.api.portal {
        limit_req zone=portal burst=5 nodelay;
        proxy_pass http://frappe-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── All other API requests ───────────────────────────────
    location /api {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://frappe-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Fallback — everything else to gunicorn ───────────────
    location / {
        proxy_pass http://frappe-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering on;
    }
}
