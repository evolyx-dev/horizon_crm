# ─────────────────────────────────────────────────────────────
# Horizon CRM — Local Development Docker Compose
#
# Architecture (mirrors production):
#   nginx (:80) → frappe bench dev server (:8000 web, :9000 socketio)
#   MariaDB, Redis Cache, Redis Queue provided by Docker
#
# Usage:
#   docker compose up              # foreground (see logs)
#   docker compose up -d           # background
#   docker compose down -v         # reset everything
#
# Environment variables (optional):
#   SEED_DEMO=1 docker compose up  # seed demo data on first run
# ─────────────────────────────────────────────────────────────
name: horizon-crm-dev

services:
  # ── Reverse Proxy (matches production) ─────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: horizon-nginx
    restart: unless-stopped
    depends_on:
      frappe:
        condition: service_started
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/method/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  # ── Database ───────────────────────────────────────────────
  mariadb:
    image: mariadb:10.6
    container_name: horizon-mariadb
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-123}
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ────────────────────────────────────────────
  redis-cache:
    image: redis:7-alpine
    container_name: horizon-redis-cache
    restart: unless-stopped
    ports:
      - "${REDIS_CACHE_PORT:-13000}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Redis Queue ────────────────────────────────────────────
  redis-queue:
    image: redis:7-alpine
    container_name: horizon-redis-queue
    restart: unless-stopped
    ports:
      - "${REDIS_QUEUE_PORT:-11000}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Frappe Dev Server ──────────────────────────────────────
  frappe:
    image: ${FRAPPE_BENCH_IMAGE:-frappe/bench@sha256:9c79fb8acd3e23a11e62aa6771f3426909303fddee39785adf645a0f2df7d208}
    container_name: horizon-frappe
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    environment:
      - SHELL=/bin/bash
      - DB_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-123}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - FRAPPE_BRANCH=${FRAPPE_BRANCH:-version-15}
      - FRAPPE_COMMIT=${FRAPPE_COMMIT:-7abafc4824ec8d71e9127df965e54913bb41a870}
      - PRIMARY_SITE_NAME=${PRIMARY_SITE_NAME:-horizon.localhost}
      - SECONDARY_SITE_NAME=${SECONDARY_SITE_NAME:-tenant2.localhost}
      - SECONDARY_BENCH_PORT=${SECONDARY_BENCH_PORT:-8001}
      - SITE_NAME=${PRIMARY_SITE_NAME:-horizon.localhost}
      - PORTAL_LEAD_RATE_LIMIT=${PORTAL_LEAD_RATE_LIMIT:-250}
      - SEED_DEMO=${SEED_DEMO:-0}
    volumes:
      - .:/workspace/horizon_crm:cached
      - bench-data:/workspace/frappe-bench
    ports:
      - "${BENCH_PORT:-8000}:8000"
      - "${SECONDARY_BENCH_PORT:-8001}:8001"
      - "${SOCKETIO_PORT:-9000}:9000"
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: bash /workspace/horizon_crm/docker/init.sh

volumes:
  mariadb-data:
  bench-data:
