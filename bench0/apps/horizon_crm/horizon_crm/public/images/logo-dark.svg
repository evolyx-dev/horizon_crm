<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E53;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="techGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94A3B8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#CBD5E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ICON — compact sun/horizon -->
  <g transform="translate(4, 4)">
    <path d="M 10 30 A 18 18 0 0 1 46 30" fill="url(#sunGrad)" />
    <rect x="4" y="33" width="48" height="5" rx="2.5" fill="url(#techGradDark)" />
    <rect x="12" y="42" width="32" height="4" rx="2" fill="url(#techGradDark)" opacity="0.7"/>
    <rect x="18" y="49" width="20" height="3" rx="1.5" fill="url(#techGradDark)" opacity="0.4"/>
  </g>

  <!-- TYPOGRAPHY — light text for dark backgrounds -->
  <g transform="translate(62, 40)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="28" fill="#F1F5F9" letter-spacing="-0.5">Horizon</text>
    <text x="112" y="0" font-family="system-ui, -apple-system, sans-serif" font-weight="300" font-size="28" fill="#94A3B8" letter-spacing="0.5">CRM</text>
  </g>
</svg>