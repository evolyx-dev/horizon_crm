<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80">
  <defs>
    <style>
      .anim-sun { animation: floatSun 3s ease-in-out infinite; }
      .anim-block-1 { animation: pulseData 1.5s ease-in-out infinite; }
      .anim-block-2 { animation: pulseData 1.5s ease-in-out 0.75s infinite; }
      .anim-text { animation: pulseText 2s ease-in-out infinite; }
      @keyframes floatSun { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-3px); } }
      @keyframes pulseData { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
      @keyframes pulseText { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E53;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2027;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#203A43;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C5364;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ICON -->
  <g transform="translate(4, 4)">
    <path class="anim-sun" d="M 10 30 A 18 18 0 0 1 46 30" fill="url(#sunGrad)" />
    <rect x="4" y="33" width="48" height="5" rx="2.5" fill="url(#techGrad)" />
    <rect class="anim-block-1" x="12" y="42" width="32" height="4" rx="2" fill="url(#techGrad)"/>
    <rect class="anim-block-2" x="18" y="49" width="20" height="3" rx="1.5" fill="url(#techGrad)"/>
  </g>

  <!-- TYPOGRAPHY -->
  <g transform="translate(62, 40)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="28" fill="#0F2027" letter-spacing="-0.5">Horizon</text>
    <text class="anim-text" x="112" y="0" font-family="system-ui, -apple-system, sans-serif" font-weight="300" font-size="28" fill="#64748B" letter-spacing="0.5">CRM</text>
    <text class="anim-text" x="2" y="20" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="9" fill="#FF8E53" letter-spacing="3">LOADING...</text>
  </g>
</svg>