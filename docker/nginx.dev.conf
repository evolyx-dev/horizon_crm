# ─────────────────────────────────────────────────────────────
# Horizon CRM — Nginx Dev / Codespace Config
#
# Lightweight reverse proxy for development and demo environments.
# Proxies all traffic to the bench dev server (frappe:8000/9000).
#
# Differences from production (deploy/nginx.conf):
#   - No rate limiting (dev-friendly)
#   - No static asset caching (bench handles hot-reload)
#   - proxy_buffering off (faster dev feedback)
# ─────────────────────────────────────────────────────────────

upstream frappe-bench {
    server frappe:8000 fail_timeout=0;
}

upstream frappe-socketio {
    server frappe:9000 fail_timeout=0;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # Gzip compression
    gzip on;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        application/xml application/xml+rss
        image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_vary on;

    # Security headers (match production)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Socketio — WebSocket upgrade ─────────────────────────
    location /socket.io {
        proxy_pass http://frappe-socketio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── All traffic to bench dev server ──────────────────────
    location / {
        proxy_pass http://frappe-bench;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
}
